# Force `npm install` (et non `npm ci`) pour que le bon binaire natif
# @tailwindcss/oxide de la plateforme Linux soit résolu.
# Le package-lock.json généré sous Windows ne verrouille que le binaire win32,
# ce qui fait échouer `npm ci` sur Railway (npm/cli#4828).
[phases.install]
cmds = ['npm install']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'serve -s dist -l $PORT'
